<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>인공지능 동물상 테스트 (AI Animal Face Test)</title>
    <link href='/style.css' rel='stylesheet'>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4505230211997855"
     crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-4505230211997855">
    <!-- TensorFlow.js and Teachable Machine libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <button id="theme-toggle">Dark Mode</button>
    
    <main class="container">
        <header>
            <h1>인공지능 동물상 테스트</h1>
            <p class="subtitle">나는 어떤 동물을 닮았을까? 지금 바로 확인해보세요!</p>
        </header>

        <section id="upload-section">
            <div id="upload-area" class="upload-area">
                <input type="file" id="image-upload" accept="image/*" hidden />
                <label for="image-upload">
                    <div class="upload-content">
                        <img id="preview-image" src="" alt="Image Preview" style="display: none;" />
                        <div id="upload-placeholder">
                            <span class="icon">📸</span>
                            <p>이미지를 클릭하거나 드래그하여 업로드하세요</p>
                        </div>
                    </div>
                </label>
            </div>
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>AI가 분석 중입니다...</p>
            </div>
        </section>

        <section id="result-section" style="display: none;">
            <h2>분석 결과</h2>
            <div id="label-container"></div>
            
            <!-- AdSense Responsive Ad -->
            <div class="ad-container">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-4505230211997855"
                     data-ad-slot="YOUR_AD_SLOT"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>

            <button id="retry-button">다시 시도하기</button>
        </section>
    </main>

    <div id="contact-form-container">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/xkoqkzoz" method="POST">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" name="name" id="name" required placeholder="성함을 입력해주세요">
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" name="_replyto" id="email" required placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea name="message" id="message" required placeholder="제휴 관련 문의 내용을 입력해주세요"></textarea>
            </div>
            <button type="submit">문의하기</button>
        </form>
    </div>

    <div id="disqus-container">
        <div id="disqus_thread"></div>
        <script>
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder-uvsz0umnze.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
