<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lotto Number Generator</title>
    <link href='/style.css' rel='stylesheet'>
</head>
<body>
    <button id="theme-toggle">Dark Mode</button>
    <h1>Lotto Number Generator</h1>
    <div id="numbers-container"></div>
    <button id="generate-button">Generate Numbers</button>

    <div id="contact-form-container">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/xkoqkzoz" method="POST">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" name="name" id="name" required placeholder="성함을 입력해주세요">
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" name="_replyto" id="email" required placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea name="message" id="message" required placeholder="제휴 관련 문의 내용을 입력해주세요"></textarea>
            </div>
            <button type="submit">문의하기</button>
        </form>
    </div>

    <div id="disqus-container">
        <div id="disqus_thread"></div>
        <script>

    </div>

    <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
